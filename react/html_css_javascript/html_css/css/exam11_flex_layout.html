<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #wrapper {
            background-color: aqua;
            height: 500px;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: antiquewhite;
            height: 150px;
        }

        section {
            background-color: brown;
            flex-grow: 1;
            display: flex;

        }

        footer {
            height: 70px;
        }

        nav {
            background-color: blue;
            width: 200px;
        }

        article {
            flex-grow: 1;
        }

    </style>
</head>
<body>
    <div id="wrapper">
        <header>
            header
        </header>

        <section>
            <nav>nav</nav>
            <article>article</article>
            
        </section>

        <footer>
            footer
        </footer>
    </div>
</body>
</html>
