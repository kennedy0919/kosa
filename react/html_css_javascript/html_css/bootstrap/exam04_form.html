<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>
    <div class="card m-3">
        <div class="card-header">
            BoardWriteForm Component
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label for="btitle" class="form-label">게시물 제목</label>
                <input type="text" class="form-control" id="btitle" placeholder="게시물 제목 입력">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">내용</label>
                <textarea class="form-control" id="bcontent" rows="5"></textarea>
            </div>
            <div class="mb-3">
                <label for="battach" class="form-label">첨부</label>
                <input class="form-control" type="file" id="battach">
            </div>
            <div class="text-end">
                <button class="btn btn-info btn-sm">등록</button>
                <button class="btn btn-info btn-sm">취소</button>
            </div>
        </div>
    </div>
</body>

</html>
