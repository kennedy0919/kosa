<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>

        function fun1 () {
            // 객체 생성
            const car = {
                // 필드 선언
                name: "그랜저",
                speed: 60,
                // 메소드 선언
                start: function () {
                    console.log(this.name + "가 시동을 겁니다.");
                },
                run: function () {
                    this.start();
                    console.log(this.speed + "로 달립니다.");
                }
            };

            car.start();
            car.run();

        }
        const fun2 = function() {
            var name = "홍길동";
            var age = 25;
            var job = "개발자";

            const member1 = { name: name, age: age, job: job };
            const member2 = { name, age, job }; 
            console.log(member2);
        }

    </script>

</head>
<body>
    <button class="btn btn-info btn-sm m-2" onclick="fun1()">fun1() 호출</button>
    <button class="btn btn-info btn-sm m-2" onclick="fun2()">fun2() 호출</button>
</body>
</html>
