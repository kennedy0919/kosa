    <button class="btn btn-info btn-sm m-2" onclick="fun1()">fun1() 호출</button>
    <script>
        function fun1() {
            const arr = ["Java", "JavaScript", "React"];
            console.log(arr[1]);
            arr[1] = "Spring";
            console.log(arr[1]);
            console.log("\n");

            // 반복1
            for (var i = 0; i < arr.length; i++) {
                console.log(arr[i]); 
            }
            console.log("\n");

            // 반복2
            for (var item of arr) {
                console.log(item);
            }
            console.log("\n");

            // 반복3
            arr.forEach((item) => {
                console.log(item);
            });

        }
    </script>
