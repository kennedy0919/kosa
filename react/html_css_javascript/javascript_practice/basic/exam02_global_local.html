<body>
    <script>
        // 전역 변수 선언
        var var1 = 1;
        let var2 = 1;
        const var3 = 1;
        console.log("var1: " + var1);
        console.log("var2: " + var2);
        console.log("var3: " + var3);

        // 전역 변수 변경
        var1 = var1 + 1;
        var2 = var2 + 1;
        // var3 = var3 + 1;  불변

        // 함수 선언
        function fun1() {
            // 로컬 변수 선언
            var var4 = 1;
            let var5 = 1;
            const var6 = 1;
            var7 = 1;

            console.log("var1: " + var1);
            console.log("var2: " + var2);
            console.log("var3: " + var3);

            console.log("var4: " + var4);
            console.log("var5: " + var5);
            console.log("var6: " + var6);
            console.log("var7: " + var7);
        }
        
        fun1();

        // console.log("var4: " + var4);
        // console.log("var5: " + var5);
        // console.log("var6: " + var6);
        console.log("var7: " + var7);

        // 함수 호출


    </script>
