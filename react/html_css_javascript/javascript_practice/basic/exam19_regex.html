<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function checkData () {
            const mid = document.querySelector("#mid").value;
            const mpassword = document.querySelector("#mpassword").value;
            const memail = document.querySelector("#memail").value;

            console.log("mid: ", mid);
            console.log("mpassword: ", mpassword);
            console.log("memail: ", memail);

            // mid 규칙
            // 최소 5자 최대 15자 알파벳 숫자
             const midRegExp = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{5,15}$/;
             if (midRegExp.test(mid)) {
                console.log("올바른 mid");
             } else {
                console.log("잘못된 mid");
             }
             // mpassword 규칙
             // 최소 8자 최대 20자 대소문자 혼용 특수문자 1개이상 한글 안됨
             const mpasswordRegExp = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[^A-Za-z0-9])[A-Za-z\d!@#$%^&*()_+[\]{};':"\\|,.<>/?-]{8,20}$/
             if (mpasswordRegExp.test(mpassword)) {
                console.log("올바른 mpassword");
             } else {
                console.log("잘못된 mpassword");
             }

             // memail
             const memailRegExp = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/
             if (memailRegExp.test(memail)) {
                console.log("올바른 memail");
             } else {
                console.log("잘못된 memail");
             }
        }
    </script>

</head>
<body>
    <div class="card m-3">
        <div class="card-header">
            정규 표현식(유효성 검사)
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label for="mid" class="form-label">아이디</label>
                <input type="text" class="form-control" id="mid">
            </div>
            <div class="mb-3">
                <label for="mpassword" class="form-label">비밀번호</label>
                <input type="password" class="form-control" id="mpassword">
            </div>
            <div class="mb-3">
                <label for="memail" class="form-label">이메일</label>
                <input type="email" class="form-control" id="memail">
            </div>
            <div class="text-end">
                <button class="btn btn-info btn-sm" onclick="checkData()">등록</button>
            </div>
        </div>
    </div>
</body>
</html>
