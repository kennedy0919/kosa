<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function task() {
            const promise = new Promise((resolve, reject) => {
                // 시간을 요하는 작업...
                const result = false;
                if (result) {
                    const result = { message: "작업 성공", data: "결과 데이터" };
                    // 성공적으로 작업을 완료
                    resolve(result);
                } else {
                    // 실패 했을때 원인
                    const result = { message: "실패 원인" }
                    // 작업처리가 실패
                    reject(result);
                }
            });
            return promise;
        }
    </script>
</head>

<body>
    <button onclick="work1()">비동기 작업 처리1</button>
    <script>
        function work1() {
            task()
                .then((result) => console.log(result))
                .catch((result) => console.log(result));
        }
    </script>

    <!-- 가장 많이씀!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!! -->
    <button onclick="work3()">비동기 작업 처리3</button>
    <script>
        async function work3() {
            try {
                const result = await task();
                console.log(result);
            } catch (result) {
                console.log(result);
        }
    }
    </script>
</body>

</html>
