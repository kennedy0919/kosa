<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>
    <div class="card">
        <div class="card-header">
            회원 가입
        </div>
        <div class="card-body">
            <div class="form-group m-2">
                <label for="uid">ID</label>
                <input type="text" class="form-control" id="uid" />
                <small id="uidHelp" class="form-text text-muted">알파벳 대소문자, 숫자를 혼용해서 6자 이상 10자 이하</small>
            </div>

            <div class="form-group m-2">
                <label for="uemail">Email</label>
                <input type="email" class="form-control" id="uemail" />
            </div>

            <div class="form-group m-2">
                <label for="upassword">Password</label>
                <input type="password" class="form-control" id="upassword" />
                <small id="passwordHelp" class="form-text text-muted">알파벳 대소문자, 숫자를 혼용해서 8자 이상 15자 이하</small>
            </div>

            <div class="form-group m-2">
                <label for="uphone">Phone</label>
                <input type="text" class="form-control" id="uphone" />
                <small id="phoneHelp" class="form-text text-muted">예) 010-123-1234, 010-1234-1234</small>
            </div>

            <div class="form-group m-2">
                <label for="ucity">City</label>
                <select id="ucity" class="form-control">
                    <option value="seoul">서울</option>
                    <option value="pusan">부산</option>
                    <option selected value="jeju">제주</option>
                </select>
            </div>

            <div class="form-group m-2">
                <label for="uhobby">Hobby</label>
                <div class="form-check">
                    <input type="checkbox" name="uhobby" value="movie" checked />
                    <label> 영화 </label>
                    <input type="checkbox" name="uhobby" value="trip" checked />
                    <label> 여행 </label>
                    <input type="checkbox" name="uhobby" value="game" />
                    <label> 게임 </label>
                </div>
            </div>

            <div class="form-group m-2">
                <label for="ujob">Job</label>
                <div class="form-check">
                    <input type="radio" name="ujob" value="developer" />
                    <label> 개발자 </label>
                    <input type="radio" name="ujob" value="designer" checked />
                    <label> 디자이너 </label>
                    <input type="radio" name="ujob" value="manager" />
                    <label> 매니저 </label>
                </div>
            </div>

            <div class="text-center m-2">
                <button id="checkData" class="btn btn-info btn-sm">회원가입</button>
                <!-- 
                [문제]
                회원 가입 버튼을 클릭하면
                사용자가 입력한 내용을 검사하는 코드를 작성합니다.
                만약 하나라도 유효하지 않는 데이터라면
                콘솔에 "데이터가 유효하지 않음" 이라고 출력
                모든 데이터가 유효하다면 다음과 같이 출력하세요
                {   
                    uid: "xxx", 
                    uemail: "xxx", 
                    upassword: "xxx",
                    uphone: "010-1234-1234",
                    ucity: "seoul",
                    uhobby: ["movie", "game"],
                    ujob: "developer"
                 }
                -->
            </div>
        </div>
    </div>
    <script src="exam04.js"></script>
</body>

</html>
