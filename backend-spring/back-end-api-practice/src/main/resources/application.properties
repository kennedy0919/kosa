# 프로젝트 이름
spring.application.name=back-end-api-practice

# 서버 포트
server.port=80

# 터미널 칼라 출력(vs code)
spring.output.ansi.enabled=ALWAYS

# 로깅
logging.pattern.console=%clr(%-5level){green} %clr(%logger{36}.%M\\(\\)){cyan}: %msg%n

# 파일 업로드
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

mybatis.config-location=classpath:mybatis/config/mybatis_config.xml
mybatis.mapper-locations=classpath:mybatis/mapper/*.xml

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@192.168.5.48:1521/xepdb1
spring.datasource.username=user_spring
spring.datasource.password=oracle